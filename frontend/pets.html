<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Наши питомцы — Приют Томасина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400;700&family=Russo+One&family=Shantell+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="pets.css" />
</head>
<body>
  <div class="page-shell pets-page">
    <header class="site-header">
      <div class="header-top">
        <button class="burger" aria-label="Открыть меню">☰</button>
        <a href="../index.html" class="brand" aria-label="Томасина"><img src="assets/images/logo.png" alt="Логотип Томасина" /></a>
        <form class="search-form" role="search"><input type="search" placeholder="поиск" aria-label="Поиск" /></form>
        <div class="auth-links"><a href="login.html">Войти</a><a href="register.html">Зарегистрироваться</a></div>
      </div>
      <nav class="main-nav" aria-label="Главное меню">
        <a href="../index.html">Главная</a><a href="pets.html">Наши котики</a><a href="news.html">Новости</a><a href="../index.html#about">О приюте</a><a href="../index.html#help">Как помочь</a><a href="../index.html#contacts">Контакты</a>
      </nav>
    </header>

    <main class="pets-main">
      <section class="pets-section">
        <h1>Наши питомцы</h1>
        <p class="pets-total">Всего в приюте сейчас живёт <span id="pets-total-count">0</span> кошки, которые ждут своего человека</p>

        <div class="pets-top-row">
          <div class="pets-filters">
            <div class="pets-filter">
              <button type="button" class="pets-filter-toggle">Возраст</button>
              <div class="pets-filter-box" data-filter-group>
                <label><input type="checkbox" data-filter="age" value="котенок" /> Котенок</label>
                <label><input type="checkbox" data-filter="age" value="молодой" /> Молодой</label>
                <label><input type="checkbox" data-filter="age" value="взрослый" /> Взрослый</label>
                <label><input type="checkbox" data-filter="age" value="пожилой" /> Пожилой</label>
              </div>
            </div>
            <div class="pets-filter">
              <button type="button" class="pets-filter-toggle">Пол</button>
              <div class="pets-filter-box" data-filter-group>
                <label><input type="checkbox" data-filter="gender" value="мальчик" /> Мальчик</label>
                <label><input type="checkbox" data-filter="gender" value="девочка" /> Девочка</label>
              </div>
            </div>
            <div class="pets-filter">
              <button type="button" class="pets-filter-toggle">Окрас</button>
              <div class="pets-filter-box" data-filter-group id="pets-color-filter-box">
              </div>
            </div>
          </div>
          <a id="add-pet-btn" data-admin-only hidden href="add-pet.html" class="btn pets-add-btn">Добавить питомца</a>
        </div>

        <div class="pets-grid" id="pets-grid"></div>
        <button type="button" class="btn pets-more-btn" id="pets-load-more">Показать еще</button>
      </section>
    </main>

    <footer class="site-footer paws-bg">
      <div class="footer-inner">
        <img src="assets/images/logo-footer.png" alt="Томасина" class="footer-logo" />
        <ul class="footer-nav"><li><a href="../index.html">Главная</a></li><li><a href="pets.html">Каталог животных</a></li><li><a href="news.html">Новости</a></li><li><a href="../index.html#about">О нас</a></li></ul>
        <ul class="footer-nav"><li><a href="register.html">Регистрация</a></li><li><a href="login.html">Вход</a></li></ul>
        <div class="footer-contacts"><div class="footer-socials"><a href="#" aria-label="VK"><img src="assets/images/vk.png" alt="VK" /></a><a href="#" aria-label="Telegram"><img src="assets/images/telegram.png" alt="Telegram" /></a></div><p>+7 (3952) 62-23-90</p><p>tomasinafond@rambler.ru</p></div>
      </div>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
