<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кабинет работника — Приют Томасина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400;700&family=Russo+One&family=Shantell+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="worker.css" />
</head>
<body>
  <div class="page-shell worker-page">
    <header class="site-header">
      <div class="header-top">
        <button class="burger" aria-label="Открыть меню">☰</button>
        <a href="../index.html" class="brand" aria-label="Томасина"><img src="assets/images/logo.png" alt="Логотип Томасина" /></a>
        <form class="search-form" role="search"><input type="search" placeholder="поиск" aria-label="Поиск" /></form>
        <div class="admin-auth-links"><a href="worker.html#profile">Профиль</a><button type="button" id="worker-logout" class="admin-logout-link">Выйти</button></div>
      </div>
      <nav class="main-nav" aria-label="Главное меню">
        <a href="../index.html">Главная</a><a href="pets.html">Наши котики</a><a href="news.html">Новости</a><a href="../index.html#about">О приюте</a><a href="../index.html#help">Как помочь</a><a href="../index.html#contacts">Контакты</a>
      </nav>
    </header>

    <main class="worker-main" id="profile">
      <section class="worker-layout">
        <aside class="worker-profile-card" id="worker-profile-card">
          <h2 id="worker-profile-name">Загрузка...</h2>
          <p id="worker-profile-phone">—</p>
          <p id="worker-profile-email">—</p>
          <button type="button" class="worker-profile-logout auth-logout-btn">Выйти</button>
        </aside>

        <section class="worker-section worker-section-processing" id="worker-processing-requests">
          <h1>Заявки в работе</h1>
          <p class="worker-message" id="worker-message" aria-live="polite"></p>
          <div class="worker-requests-grid" id="worker-processing-grid"></div>
        </section>
      </section>

      <section class="worker-section" id="worker-new-requests">
        <h2>Заявки на питомцев новые</h2>
        <div class="worker-requests-grid" id="worker-new-grid"></div>
        <div class="worker-section-link-wrap"><button type="button" class="worker-section-link" data-toggle-section="worker-all">Смотреть все заявки</button></div>
      </section>
    </main>

    <div class="worker-modal" id="worker-request-modal" aria-hidden="true">
      <div class="worker-modal-backdrop" data-modal-close></div>
      <div class="worker-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="worker-request-modal-title">
        <button type="button" class="worker-modal-close" aria-label="Закрыть" data-modal-close>×</button>
        <h3 id="worker-request-modal-title">Детали заявки</h3>
        <p class="worker-modal-message" id="worker-request-modal-message" aria-live="polite"></p>
        <div class="worker-modal-content" id="worker-request-modal-content"></div>
        <div class="worker-modal-actions">
          <button type="button" class="worker-status-btn new" data-request-status="новая">Новая</button>
          <button type="button" class="worker-status-btn processing" data-request-status="в обработке">В обработке</button>
          <button type="button" class="worker-status-btn approve" data-request-status="одобрена">Одобрено</button>
          <button type="button" class="worker-status-btn rejected" data-request-status="отклонена">Отклонено</button>
          <button type="button" class="worker-status-btn closed" data-request-status="закрыта">Закрыта</button>
        </div>
      </div>
    </div>

    <footer class="site-footer paws-bg worker-footer">
      <div class="footer-inner worker-footer-inner">
        <img src="assets/images/logo-footer.png" alt="Томасина" class="footer-logo" />
        <ul class="footer-nav"><li><a href="../index.html">Главная</a></li><li><a href="pets.html">Каталог животных</a></li><li><a href="news.html">Новости</a></li><li><a href="../index.html#about">О нас</a></li></ul>
        <ul class="footer-nav"><li><a href="worker.html#profile">Профиль</a></li></ul>
        <div class="footer-contacts"><div class="footer-socials"><a href="#" aria-label="VK"><img src="assets/images/vk.png" alt="VK" /></a><a href="#" aria-label="Telegram"><img src="assets/images/telegram.png" alt="Telegram" /></a></div><p>+7 (3952) 62-23-90</p><p>tomasinafond@rambler.ru</p></div>
      </div>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
