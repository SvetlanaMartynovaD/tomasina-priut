<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Приют Томасина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400;700&family=Russo+One&family=Shantell+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="page-shell login-page">
    <header class="site-header">
      <div class="header-top">
        <button class="burger" aria-label="Открыть меню">☰</button>
        <a href="../index.html" class="brand" aria-label="Томасина">
          <img src="assets/images/logo.png" alt="Логотип Томасина" />
        </a>
        <form class="search-form" role="search">
          <input type="search" placeholder="поиск" aria-label="Поиск" />
        </form>
        <div class="auth-links">
          <a href="login.html">Войти</a>
          <a href="register.html">Зарегистрироваться</a>
        </div>
      </div>
      <nav class="main-nav" aria-label="Главное меню">
        <a href="../index.html">Главная</a>
        <a href="pets.html">Наши котики</a>
        <a href="news.html">Новости</a>
        <a href="../index.html#about">О приюте</a>
        <a href="../index.html#help">Как помочь</a>
        <a href="../index.html#contacts">Контакты</a>
      </nav>
    </header>

    <main class="login-main">
      <section class="login-section">
        <h1>Вход</h1>

        <form class="login-form" id="login-form" novalidate>
          <div class="field-wrap">
            <input type="email" id="login_email" name="login_email" placeholder="Email" required />
            <small class="field-error" data-error-for="login_email"></small>
          </div>

          <div class="field-wrap">
            <input type="password" id="login_password" name="login_password" placeholder="Пароль" required />
            <small class="field-error" data-error-for="login_password"></small>
          </div>

          <button type="submit" class="btn login-submit">Войти</button>
          <p class="login-message" id="login-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer paws-bg">
      <div class="footer-inner">
        <img src="assets/images/logo-footer.png" alt="Томасина" class="footer-logo" />
        <ul class="footer-nav">
          <li><a href="../index.html">Главная</a></li>
          <li><a href="pets.html">Каталог животных</a></li>
          <li><a href="news.html">Новости</a></li>
          <li><a href="#">О нас</a></li>
        </ul>
        <ul class="footer-nav">
          <li><a href="register.html">Регистрация</a></li>
          <li><a href="login.html">Вход</a></li>
        </ul>
        <div class="footer-contacts">
          <div class="footer-socials">
            <a href="#" aria-label="VK"><img src="assets/images/vk.png" alt="VK" /></a>
            <a href="#" aria-label="Telegram"><img src="assets/images/telegram.png" alt="Telegram" /></a>
          </div>
          <p>+7 (3952) 62-23-90</p>
          <p>tomasinafond@rambler.ru</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="main.js"></script>
</body>
</html>
