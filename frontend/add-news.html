<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить новость — Приют Томасина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400;700&family=Russo+One&family=Shantell+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="add-news.css" />
</head>
<body>
  <div class="page-shell add-news-page">
    <header class="site-header">
      <div class="header-top">
        <button class="burger" aria-label="Открыть меню">☰</button>
        <a href="../index.html" class="brand" aria-label="Томасина"><img src="assets/images/logo.png" alt="Логотип Томасина" /></a>
        <form class="search-form" role="search"><input type="search" placeholder="поиск" aria-label="Поиск" /></form>
        <div class="auth-links"><a href="admin.html">Профиль</a><button type="button" class="auth-logout-btn">Выйти</button></div>
      </div>
    </header>

    <main class="add-news-main">
      <section class="add-news-section">
        <h1>Добавить новость</h1>
        <form id="add-news-form" class="add-news-form" novalidate>
          <input name="title" placeholder="Заголовок" required />
          <select name="type" required>
            <option value="новость">Новость</option>
            <option value="мероприятие">Мероприятие</option>
          </select>
          <textarea name="content" placeholder="Описание новости" required></textarea>
          <input name="photo_1" placeholder="Ссылка на изображение" />
          <input name="photo_2" placeholder="Ссылка на изображение" />
          <input name="photo_3" placeholder="Ссылка на изображение" />
          <button type="submit" class="btn add-news-submit">Добавить</button>
          <p id="add-news-message" class="add-news-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer paws-bg">
      <div class="footer-inner">
        <img src="assets/images/logo-footer.png" alt="Томасина" class="footer-logo" />
        <ul class="footer-nav"><li><a href="../index.html">Главная</a></li><li><a href="pets.html">Каталог животных</a></li><li><a href="news.html">Новости</a></li><li><a href="../index.html#about">О нас</a></li></ul>
        <ul class="footer-nav"><li><a href="admin.html">Профиль</a></li><li><a href="stats.html">Статистика</a></li></ul>
        <div class="footer-contacts"><div class="footer-socials"><a href="#" aria-label="VK"><img src="assets/images/vk.png" alt="VK" /></a><a href="#" aria-label="Telegram"><img src="assets/images/telegram.png" alt="Telegram" /></a></div><p>+7 (3952) 62-23-90</p><p>tomasinafond@rambler.ru</p></div>
      </div>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
