<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Добавить питомца — Приют Томасина</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Buenard:wght@400;700&family=Russo+One&family=Shantell+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="add-pet.css" />
</head>
<body>
  <div class="page-shell add-pet-page">
    <header class="site-header">
      <div class="header-top">
        <button class="burger" aria-label="Открыть меню">☰</button>
        <a href="../index.html" class="brand" aria-label="Томасина"><img src="assets/images/logo.png" alt="Логотип Томасина" /></a>
        <form class="search-form" role="search"><input type="search" placeholder="поиск" aria-label="Поиск" /></form>
        <div class="auth-links"><a href="admin.html">Профиль</a><a href="#" data-logout-link>Выйти</a></div>
      </div>
      <nav class="main-nav" aria-label="Главное меню">
        <a href="../index.html">Главная</a><a href="pets.html">Наши котики</a><a href="news.html">Новости</a><a href="../index.html#about">О приюте</a><a href="../index.html#help">Как помочь</a><a href="../index.html#contacts">Контакты</a>
      </nav>
    </header>

    <main class="add-pet-main">
      <section class="add-pet-section">
        <h1>Добавить питомца</h1>
        <form id="add-pet-form" class="add-pet-form" novalidate>
          <input name="name" placeholder="Кличка" required />
          <select name="gender" required>
            <option value="">Пол</option>
            <option value="мальчик">Мальчик</option>
            <option value="девочка">Девочка</option>
          </select>
          <select name="age_category" required>
            <option value="">Возрастная категория</option>
            <option value="котенок">Котенок</option>
            <option value="молодой">Молодой</option>
            <option value="взрослый">Взрослый</option>
            <option value="пожилой">Пожилой</option>
          </select>
          <input name="color" placeholder="Окрас" required />
          <input name="photo_url" placeholder="Ссылка на изображение" />
          <textarea name="description" placeholder="Описание питомца" required></textarea>
          <button type="submit" class="btn add-pet-submit">Добавить</button>
          <p id="add-pet-message" class="add-pet-message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer paws-bg">
      <div class="footer-inner">
        <img src="assets/images/logo-footer.png" alt="Томасина" class="footer-logo" />
        <ul class="footer-nav"><li><a href="../index.html">Главная</a></li><li><a href="pets.html">Каталог животных</a></li><li><a href="news.html">Новости</a></li><li><a href="../index.html#about">О нас</a></li></ul>
        <ul class="footer-nav"><li><a href="admin.html">Профиль</a></li></ul>
        <div class="footer-contacts"><div class="footer-socials"><a href="#" aria-label="VK"><img src="assets/images/vk.png" alt="VK" /></a><a href="#" aria-label="Telegram"><img src="assets/images/telegram.png" alt="Telegram" /></a></div><p>+7 (3952) 62-23-90</p><p>tomasinafond@rambler.ru</p></div>
      </div>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
